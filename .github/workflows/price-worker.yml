name: Price Worker

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

concurrency:
  group: price-worker
  cancel-in-progress: false

jobs:
  run-worker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run pricing sync once
        env:
          NODE_ENV: production
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          BACKEND_INTERNAL_URL: ${{ secrets.BACKEND_INTERNAL_URL }}
          BACKEND_INTERNAL_TOKEN: ${{ secrets.BACKEND_INTERNAL_TOKEN }}
          BACKEND_REPO_OWNER: ${{ secrets.BACKEND_REPO_OWNER }}
          BACKEND_REPO_NAME: ${{ secrets.BACKEND_REPO_NAME }}
          BACKEND_REPO_DISPATCH_EVENT: ${{ secrets.BACKEND_REPO_DISPATCH_EVENT }}
          BACKEND_REPO_DISPATCH_TOKEN: ${{ secrets.BACKEND_REPO_DISPATCH_TOKEN }}
        run: npm run sync:once
